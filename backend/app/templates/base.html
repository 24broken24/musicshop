<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MusicShop{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    header { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .muted { color: #666; }
    .card { border: 1px solid #ddd; padding: 12px; margin: 10px 0; border-radius: 8px; }
    input, select, button { padding: 8px; margin: 6px 0; }
    button { cursor: pointer; }
    nav a { margin-right: 8px; }
    .error { color: #b00020; }
  </style>
</head>
<body>
<header>
  <nav>
    <a href="/search">Поиск</a>
    {% if user is defined and user %}
      {% if user.role == 'admin' %}
        <a href="/admin/vinyls/new">Админ: добавить пластинку</a>
      {% endif %}
      <a href="/cart">Корзина ({{ cart_count }})</a>
      <a href="/logout">Выйти</a>
    {% else %}
      <a href="/login">Войти</a>
      <a href="/register">Регистрация</a>
      <span class="muted">Корзина ({{ cart_count }})</span>
    {% endif %}
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
