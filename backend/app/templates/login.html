{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
  <div class="mx-auto max-w-md">
    <div class="rounded-2xl border border-white/10 bg-white/5 p-6 backdrop-blur neon">
      <h1 class="text-2xl font-semibold tracking-tight">Вход</h1>
      <p class="mt-1 text-sm text-[color:var(--txt2)]">Войдите, чтобы добавлять товары в корзину и оформлять заказы.</p>

      {% if error %}
        <div class="mt-4 rounded-xl border border-pink-400/30 bg-pink-500/10 px-4 py-3 text-sm text-pink-200 neon-pink">
          {{ error }}
        </div>
      {% endif %}

      <form method="post" action="/login" class="mt-5 space-y-3">
        <div>
          <label class="text-sm font-medium text-[color:var(--txt1)]">Email</label>
          <input class="mt-1 w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-white placeholder:text-white/40 outline-none focus:ring-2 focus:ring-cyan-300/40 neon-cyan"
                 type="email" name="email" required placeholder="you@example.com">
        </div>
        <div>
          <label class="text-sm font-medium text-[color:var(--txt1)]">Пароль</label>
          <input class="mt-1 w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-white placeholder:text-white/40 outline-none focus:ring-2 focus:ring-cyan-300/40 neon-cyan"
                 type="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit"
                class="w-full rounded-xl px-4 py-2 text-white bg-gradient-to-r from-violet-500 via-cyan-400 to-pink-400 hover:opacity-95 neon">
          Войти
        </button>
        <div class="text-center text-sm text-[color:var(--txt2)]">
          Нет аккаунта? <a class="text-cyan-300 hover:text-cyan-200" href="/register">Регистрация</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
