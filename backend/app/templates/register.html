{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
  <div class="mx-auto max-w-md">
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
      <h1 class="text-2xl font-semibold tracking-tight">Регистрация</h1>
      <p class="mt-1 text-sm text-slate-500">Создайте аккаунт, чтобы собирать корзину и оформлять заказы.</p>

      {% if error %}
        <div class="mt-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
          {{ error }}
        </div>
      {% endif %}

      <form method="post" action="/register" class="mt-5 space-y-3">
        <div>
          <label class="text-sm font-medium text-slate-700">Email</label>
          <input class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-200"
                 type="email" name="email" required placeholder="you@example.com">
        </div>
        <div>
          <label class="text-sm font-medium text-slate-700">Пароль (минимум 6 символов)</label>
          <input class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-200"
                 type="password" name="password" required minlength="6" placeholder="••••••••">
        </div>
        <button type="submit"
                class="w-full rounded-xl bg-slate-900 px-4 py-2 text-white hover:bg-slate-800">
          Зарегистрироваться
        </button>
        <div class="text-center text-sm text-slate-500">
          Уже есть аккаунт? <a class="text-indigo-600 hover:text-indigo-500" href="/login">Войти</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
